spring:
  application:
    name: xiyu-bid-poc-flyway-baseline-test

  datasource:
    url: jdbc:h2:mem:baseline;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: false

  data:
    redis:
      host: localhost
      port: 6379
      database: 15

  jackson:
    default-property-inclusion: non_null

jwt:
  secret: test-secret-key-for-jwt-token-generation-and-validation
  expiration: 3600000
  refresh-expiration: 7200000

logging:
  level:
    com.xiyu: WARN
    org.springframework.security: WARN
