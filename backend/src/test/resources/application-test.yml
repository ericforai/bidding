spring:
  application:
    name: xiyu-bid-poc-test

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      database: 15

  jackson:
    default-property-inclusion: non_null

jwt:
  secret: test-secret-key-for-jwt-token-generation-and-validation
  expiration: 3600000
  refresh-expiration: 7200000

logging:
  level:
    com.xiyu: DEBUG
    org.springframework.security: DEBUG
