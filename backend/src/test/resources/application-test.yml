spring:
  application:
    name: xiyu-bid-poc-test

  datasource:
    url: jdbc:h2:mem:testdb-${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        generate_statistics: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      database: 15

  cache:
    type: simple

  jackson:
    default-property-inclusion: non_null

jwt:
  secret: test-secret-key-for-jwt-token-generation-and-validation
  expiration: 3600000
  refresh-expiration: 7200000

platform:
  account:
    encryption-key: test-platform-encryption-key-2026

app:
  tender-processing:
    worker-enabled: false

logging:
  level:
    com.xiyu: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.stat: ERROR
