spring:
  application:
    name: xiyu-bid-poc
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

ai:
  provider: ${AI_PROVIDER:mock}  # Options: mock, openai

  datasource:
    url: jdbc:postgresql://localhost:5432/xiyu_bid
    username: xiyu_user
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes TTL for dashboard cache
      cache-null-values: false
      key-prefix: "xiyu-bid:"
      use-key-prefix: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  error:
    include-message: on_param
    include-binding-errors: on_param

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: 604800000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

rate:
  limit:
    login:
      max-attempts: ${RATE_LIMIT_LOGIN_MAX:5}
      window-minutes: ${RATE_LIMIT_LOGIN_WINDOW:15}

logging:
  level:
    com.xiyu: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

