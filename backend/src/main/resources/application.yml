spring:
  mvc:
    problemdetails:
      enabled: true  # RFC 7807 错误响应格式
  application:
    name: xiyu-bid-poc
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev,mysql}
  datasource:
    url: "${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:xiyu_bid}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}"
    username: ${DB_USERNAME:xiyu_user}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false  # 性能优化：禁止 Open-in-View
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration-mysql
    baseline-on-migrate: true
    baseline-version: 0

  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes TTL for dashboard cache
      cache-null-values: false
      key-prefix: "xiyu-bid:"
      use-key-prefix: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  task:
    scheduling:
      pool:
        size: ${SPRING_TASK_SCHEDULING_POOL_SIZE:4}

ai:
  provider: ${AI_PROVIDER:mock}  # Options: mock, openai
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-5.2}
    timeout: ${OPENAI_TIMEOUT:PT30S}

app:
  bid-agent:
    upload-dir: ${BID_AGENT_UPLOAD_DIR:}
  export:
    max-records: ${APP_EXPORT_MAX_RECORDS:10000}  # Maximum records per export
    max-file-size-bytes: ${APP_EXPORT_MAX_SIZE:52428800}  # 50MB default
    audit-enabled: ${APP_EXPORT_AUDIT:true}
    max-exports-per-hour: ${APP_EXPORT_RATE_LIMIT:10}
    query-timeout-seconds: ${APP_EXPORT_QUERY_TIMEOUT:60}  # Maximum query execution time for exports
  tender-processing:
    storage-root: ${APP_TENDER_STORAGE_ROOT:/data/shared/tenders}
    max-global-concurrency: ${APP_TENDER_MAX_GLOBAL_CONCURRENCY:2}
    max-per-user-concurrency: ${APP_TENDER_MAX_PER_USER_CONCURRENCY:1}
    max-retries: ${APP_TENDER_MAX_RETRIES:3}
    retry-delays-minutes: ${APP_TENDER_RETRY_DELAYS:1,5,15}
    estimated-task-seconds: ${APP_TENDER_ESTIMATED_TASK_SECONDS:120}
    cpu-threshold: ${APP_TENDER_CPU_THRESHOLD:0.92}
    memory-threshold: ${APP_TENDER_MEMORY_THRESHOLD:0.92}
    worker-fixed-delay-ms: ${APP_TENDER_WORKER_DELAY_MS:5000}

server:
  port: 8080
  error:
    include-message: on_param
    include-binding-errors: on_param
    include-stacktrace: on_param  # 开发环境显示堆栈
  forward-headers-strategy: NATIVE  # 云平台自动处理转发头

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: 604800000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:1314,http://127.0.0.1:1314,http://localhost:1316,http://127.0.0.1:1316,http://localhost:5173,http://localhost:5174,http://localhost:3000}

rate:
  limit:
    login:
      max-attempts: ${RATE_LIMIT_LOGIN_MAX:5}
      window-minutes: ${RATE_LIMIT_LOGIN_WINDOW:15}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

wecom:
  api:
    base-url: https://qyapi.weixin.qq.com
  http:
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
  probe:
    mode: real

logging:
  level:
    com.xiyu: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.data.redis: WARN
    io.lettuce.core: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
