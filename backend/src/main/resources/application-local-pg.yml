spring:
  application:
    name: xiyu-bid-poc-local-pg

  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:25432}/${DB_NAME:xiyu_bid}
    username: ${DB_USERNAME:xiyu_user}
    password: ${DB_PASSWORD:XiyuDB!2026}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:26379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false
      key-prefix: "xiyu-bid:"
      use-key-prefix: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:18080}

jwt:
  secret: ${JWT_SECRET:xiyu-local-pg-jwt-secret-2026-with-32-chars}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: 604800000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:1818,http://127.0.0.1:1818,http://localhost:1314,http://127.0.0.1:1314}

rate:
  limit:
    login:
      max-attempts: ${RATE_LIMIT_LOGIN_MAX:1000}
      window-minutes: ${RATE_LIMIT_LOGIN_WINDOW:1}

logging:
  level:
    com.xiyu: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.data.redis: WARN
    io.lettuce.core: WARN
