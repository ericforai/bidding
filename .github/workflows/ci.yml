name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run unit tests (Vitest)
        run: npm run test:unit

      - name: Build frontend (mock)
        run: npm run build

      - name: Build frontend (api)
        run: npm run build:api

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compile backend
        run: mvn -DskipTests compile
        env:
          PLATFORM_ACCOUNT_ENCRYPTION_KEY: ci-test-key-2026

      - name: Run baseline and resource integration tests
        run: mvn -Dtest=FlywayBaselineContextTest,ExpenseControllerIntegrationTest,BarCertificateControllerIntegrationTest test
        env:
          PLATFORM_ACCOUNT_ENCRYPTION_KEY: ci-test-key-2026

  quality-scope:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
      protected_quality_changed: ${{ steps.filter.outputs.protected_quality }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            protected_quality:
              - 'backend/pom.xml'
              - 'backend/README.md'
              - 'backend/QUALITY_GATE_PLAN.md'
              - 'backend/QUALITY_GATE_GUIDE.md'
              - 'backend/src/main/java/com/xiyu/bid/marketinsight/core/**'
              - 'backend/src/main/java/com/xiyu/bid/admin/settings/core/**'
              - 'backend/src/main/java/com/xiyu/bid/task/core/**'
              - 'backend/src/main/java/com/xiyu/bid/bidresult/core/**'
              - 'backend/src/main/java/com/xiyu/bid/projectworkflow/**'
              - 'backend/src/test/java/com/xiyu/bid/admin/settings/core/**'
              - 'backend/src/test/java/com/xiyu/bid/task/core/**'
              - 'backend/src/test/java/com/xiyu/bid/bidresult/core/**'
              - 'backend/src/test/java/com/xiyu/bid/projectworkflow/**'

  backend-quality-audit:
    runs-on: ubuntu-latest
    needs: [quality-scope]
    if: needs.quality-scope.outputs.backend_changed == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run backend quality audit
        run: mvn -Pjava-quality,java-quality-spotbugs,quality-audit checkstyle:check pmd:check spotbugs:check

  backend-quality-strict:
    runs-on: ubuntu-latest
    needs: [quality-scope]
    if: needs.quality-scope.outputs.protected_quality_changed == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run backend quality strict gate
        run: mvn -Pjava-quality,java-quality-spotbugs,quality-strict -DforkCount=0 test checkstyle:check pmd:check spotbugs:check
        env:
          PLATFORM_ACCOUNT_ENCRYPTION_KEY: ci-test-key-2026

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Pre-compile backend (speeds up spring-boot:run)
        run: mvn -f backend/pom.xml -DskipTests compile -q

      - name: Build frontend for API mode
        run: npm run build:api

      - name: Run E2E commercial main flow
        run: npx playwright test commercial-main-flow --config playwright.config.js
        env:
          BACKEND_PORT: 18080
          FRONTEND_PORT: 1314
          SPRING_PROFILES_ACTIVE: e2e
          DB_PASSWORD: unused
          JWT_SECRET: ci-e2e-jwt-secret-key-with-32-chars-min

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
