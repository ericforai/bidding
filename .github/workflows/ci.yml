name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run unit tests (Vitest)
        run: npm run test:unit

      - name: Build frontend (mock)
        run: npm run build

      - name: Build frontend (api)
        run: npm run build:api

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compile backend
        run: mvn -DskipTests compile
        env:
          PLATFORM_ACCOUNT_ENCRYPTION_KEY: ci-test-key-2026

      - name: Run migration and architecture gates
        run: mvn -Dtest=FlywayBaselineContextTest,FlywayPostgresContainerTest,ArchitectureTest test
        env:
          PLATFORM_ACCOUNT_ENCRYPTION_KEY: ci-test-key-2026

      - name: Run backend quality gates
        run: mvn -Pjava-quality,java-quality-spotbugs,quality-strict -DskipTests -Djacoco.skip=true checkstyle:check pmd:check spotbugs:check
        env:
          PLATFORM_ACCOUNT_ENCRYPTION_KEY: ci-test-key-2026

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Pre-compile backend (speeds up spring-boot:run)
        run: mvn -f backend/pom.xml -DskipTests compile -q

      - name: Build frontend for API mode
        run: npm run build:api

      - name: Run API-mode E2E smoke flows
        run: npx playwright test e2e/commercial-main-flow.spec.js e2e/project-detail-workflow.spec.js e2e/document-editor-case-knowledge.spec.js --config playwright.config.js
        env:
          BACKEND_PORT: 18080
          FRONTEND_PORT: 1314
          SPRING_PROFILES_ACTIVE: e2e
          DB_PASSWORD: unused
          JWT_SECRET: ci-e2e-jwt-secret-key-with-32-chars-min

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
